# remap tmux leader
unbind C-b
set -g prefix C-f
bind C-f send-prefix

## COPY MODE 
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind P paste-buffer
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel "wl-copy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy" 
## END COPY MODE

# Lazygit toggle
bind l run-shell 'pane=$(tmux list-panes -a -F "#{pane_id} #{pane_current_command}" | grep " lazygit$" | head -1 | cut -d" " -f1); if [ -n "$pane" ]; then tmux select-pane -t "$pane"; else tmux new-window -n lazygit -c "#{pane_current_path}" lazygit; fi'

# Kill Pane-Server
bind q killp
bind x kill-session

# Open journal in new split
bind-key j split-window -h "nvim ~/wiki/journal/$(date '+%Y-%m-%d').md"
bind b last-window

## Session Management
bind S command-prompt -p "New Session:" "new-session -A -s '%%'"
bind K confirm kill-session

## Window and Pane Management
# split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# reload config file (change file location to your the tmux.conf you want to use) 
bind r source-file ~/.tmux.conf

# switch panes using Alt-arrow without prefix
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# swap panes 
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1 

set -g mouse on
set -g allow-passthrough on

# Re-apply caelestia colour scheme to each new/switching tmux client
set-hook -g client-attached 'run-shell "cat ~/.local/state/caelestia/sequences.txt > #{client_tty} 2>/dev/null || true"'
set-hook -g client-session-changed 'run-shell "cat ~/.local/state/caelestia/sequences.txt > #{client_tty} 2>/dev/null || true"'

# don't rename windows automatically
set-option -g allow-rename off

# open new windows in the current pane's path
bind w new-window -c "#{pane_current_path}"

# switch quickly to the last used window
bind Space last-window
 
# Make index start from 1
set -g base-index 1
setw -g pane-base-index 1
## END Window and Pane Management

## DESIGN TWEAKS
# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# clock mode
# setw -g clock-mode-colour yellow

# copy mode
# setw -g mode-style 'fg=black bg=red bold'

# panes
# set -g pane-border-style 'fg=#415c6d'
# set -g pane-active-border-style 'bg=default'

# statusbar - Dracula system colors
set -g status-position bottom
set -g status-justify left
set -g status-style 'bg=#282A36,fg=#F8F8F2'

# left: session name pill
set -g status-left '#[fg=#282A36,bg=#BD93F9,bold]  #S #[fg=#BD93F9,bg=#282A36,nobold]'
set -g status-left-length 30

# right: time → date with shaped separators
set -g status-right '#[fg=#6272A4,bg=#282A36]#[fg=#F8F8F2,bg=#6272A4] %H:%M #[fg=#BD93F9,bg=#6272A4]#[fg=#282A36,bg=#BD93F9,bold] %Y-%m-%d '
set -g status-right-length 50

# inactive window tabs
set -g window-status-style 'fg=#6272A4,bg=#282A36'
setw -g window-status-format '#[fg=#44475A,bg=#282A36]#[fg=#F8F8F2,bg=#44475A] #{window_index}:#{window_name} #[fg=#44475A,bg=#282A36]'

# active window tab
setw -g window-status-current-style 'fg=#282A36,bg=#BD93F9,bold'
setw -g window-status-current-format '#[fg=#BD93F9,bg=#282A36]#[fg=#282A36,bg=#BD93F9,bold] #{window_index}:#{window_name} #[fg=#BD93F9,bg=#282A36,nobold]'

# pane borders
set -g pane-border-style 'fg=#44475A'
set -g pane-active-border-style 'fg=#BD93F9'

setw -g window-status-bell-style 'fg=#F1FA8C,bg=#FF5555,bold'

# messages
set -g message-style 'fg=#F8F8F2,bg=#BD93F9,bold'

# Terminal colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ",*:Bce"

setw -g pane-border-status off
## END DESIGN TWEAKS
