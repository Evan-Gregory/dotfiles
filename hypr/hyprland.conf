$hypr = ~/.config/hypr
$hl = $hypr/hyprland

source = $hypr/variables.conf

# exec-once = hypridle
# exec-once = hyprlock || hyprctl dispatch exit

source = $hl/env.conf
source = $hl/keybinds.conf

exec-once=$hypr/autostart

source = $hl/monitors.conf

windowrulev2 = float, title:^(Picture in picture)$
windowrulev2 = pin, title:^(Picture in picture)$

# clear-glass transparency: kitty stays transparent but unblurred so desktop content
# (e.g. clock widget) remains legible through the terminal window
windowrulev2 = noblur, class:^(kitty)$

source = $hl/input.conf
source = $hl/misc.conf
source = $hl/general.conf

decoration {
    rounding=10
    # rounding_power=2
    # active_opacity = 1.0
    # inactive_opacity = 0.9
    # fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 1 
        passes = 1
        new_optimizations = on
        ignore_opacity = true
        xray = true
        vibrancy = 1
        # vibrancy = 0.1696
    }
    shadow {
        enabled=1
        color=0x33000000
        color_inactive=0x22000000
        range=100
        render_power=5
    }
    layerrule = blur, waybar
    layerrule = ignorezero, waybar
    layerrule = ignorealpha .045, waybar
}

xwayland {
    force_zero_scaling = true
    use_nearest_neighbor = true
    enabled = true
}

source = $hl/animations.conf

binds {
  workspace_back_and_forth = false
  allow_workspace_cycles = true
  pass_mouse_when_bound = false
}

dwindle {
    pseudotile=true # enable pseudotiling on dwindle
    preserve_split=true
    split_width_multiplier=1
    default_split_ratio=1.25
}

master{
    #allow_small_split=1
    always_keep_position=true
    orientation=center
    drop_at_cursor=true
}

gestures {
    workspace_swipe=yes
    workspace_swipe_fingers=4
}

# example window rules
# for windows named/classed as abc and xyz
#windowrule=move 69 420,abc
windowrule=move center,title:^(fly_is_kitty)$
windowrule=size 800 500,title:^(fly_is_kitty)$
windowrule=animation slide,title:^(all_is_kitty)$
windowrule=float,title:^(all_is_kitty)$
#windowrule=tile,xy
windowrule=tile,title:^(kitty)$
windowrule=float,title:^(fly_is_kitty)$

#windowrule=pseudo,abc
#windowrule=monitor 0,xyz
bind=ALT,TAB,movewindow, 1100 80 

bind = SUPER, M, layoutmsg, swapwithmaster master
bind = SUPER CTRL, M, togglespecialworkspace, media
bind = SUPER SHIFT, M, movetoworkspace, special:media

bind = SUPER CTRL, T, togglespecialworkspace, terminal
bind = SUPER SHIFT, T, movetoworkspace, special:terminal

# No moving this is for zen
bind = SUPER CTRL, C, togglespecialworkspace, clear

# example binds
bindm=ALT,mouse:272,movewindow
bindm=ALT, mouse:273,resizewindow

bind=SUPER,t,exec,kitty --start-as=fullscreen -o 'font_size=14' --title all_is_kitty --hold sh -c 'tmux attach -t default'
bind=SUPER,TAB,exec,kitty --title fly_is_kitty --hold sh -c 'tmux attach -t fly_is_kitty || tmux new-session -s fly_is_kitty'
bind=,Print,exec,~/.config/hypr/scripts/screenshot

# bind=SUPER,RETURN,exec,alacritty
bind=SUPER,F,fullscreen

bind=SUPER,S,togglefloating, 
bind=SUPER,S,resizeactive, exact 800 500
bind=SUPER,S,centerwindow

#bind=SUPER,P,pseudo,

bind=SUPER,h,movefocus,l
bind=SUPER,l,movefocus,r
bind=SUPER,j,movefocus,u
bind=SUPER,k,movefocus,d
bind=SUPER,n,cyclenext, 
bind=SUPER,n, bringactivetotop

bind=SUPER,mouse_down,workspace,e-1
bind=SUPER,mouse_up,workspace,e+1

bind=SUPER,tab,changegroupactive

# bind=SUPER,r,exec, pkill -9 waybar; $HOME/dotfiles/hypr/scripts/launch_waybar; $HOME/dotfiles/hypr/scripts/wall $HOME/dotfiles/hypr/wallpapers/b.jpg  

# Blueman Manager
windowrule = float,class:(blueman-manager)
windowrule = size 800 600,class:(blueman-manager)
windowrule = center,class:(blueman-manager)
bind=SUPER,b,exec,blueman-manager 

# Pavucontrol floating
windowrule = float,class:(.*org.pulseaudio.pavucontrol.*)
windowrule = size 700 600,class:(.*org.pulseaudio.pavucontrol.*)
windowrule = center,class:(.*org.pulseaudio.pavucontrol.*)
windowrule = pin,class:(.*org.pulseaudio.pavucontrol.*)
bind=SUPER,v,exec,pavucontrol

# File Viewer
windowrule = float, class:(org.gnome.Nautilus)
windowrule = center, class:(org.gnome.Nautilus)
windowrule = size 1200 800, class:(org.gnome.Nautilus)
bind=SUPER,E,exec,nautilus

# Cava
windowrule=float,title:^(fly_is_cava)$
windowrule=move center,title:^(fly_is_cava)$
windowrule=size 1200 500,title:^(fly_is_cava)$
bind=CTRL,1,exec,kitty --title fly_is_cava --hold cava

# Journal
windowrule=float,title:^(fly_is_journal)$
windowrule=move center,title:^(fly_is_journal)$
windowrule=size 1200 800,title:^(fly_is_journal)$
bind=SUPER SHIFT,J,exec, $HOME/dotfiles/hypr/scripts/journal.sh
# bind=SUPER SHIFT,J,exec,kitty --title fly_is_journal --hold nvim ~/wiki/journal/$(date '+%Y-%m-%d').md

# # Calander
# windowrule = float,class:(.*org.gnome.Calendar.*)
# windowrule = size 800 600,class:(.*org.gnome.Calendar.*)
# windowrule = center,class:(.*org.gnome.Calendar.*)
# bind=SUPER,c,exec,gnome-calendar 

# Mail
windowrule = float,class:(vivaldi-pkooggnaalmfkidjmlhoelhdllpphaga-Default)
windowrule = size 1400 1000,class:(vivaldi-pkooggnaalmfkidjmlhoelhdllpphaga-Default)
windowrule = center,class:(vivaldi-pkooggnaalmfkidjmlhoelhdllpphaga-Default)

# Clock 
windowrule=float,title:^(clock_is_kitty)$
windowrule=size 418 180,title:^(clock_is_kitty)$
bind=CTRL,4,exec,kitty --title clock_is_kitty --hold tty-clock -C5 -s -S

# rec
bind=CTRL,2,exec,kitty --title vim_is_kitty --hold nvim
bind=CTRL,5,exec,kitty --single-instance --start-as=fullscreen  --hold  btop
bind=CTRL,3,exec,kitty --title fly_is_kitty --hold ~/Documents/donut/a.out

# One Password
windowrule=float,class:(1Password)
windowrule=size 1200 600,class:(1Password) 
windowrule=center,class:(1Password)
windowrule = pin,class:(1Password)
bind=SUPER,O,exec,1password

